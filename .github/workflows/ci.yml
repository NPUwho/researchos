name: CI

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: { POSTGRES_USER: researchos, POSTGRES_PASSWORD: researchos, POSTGRES_DB: researchos_test }
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }
      - run: pip install uv && cd apps/api && uv pip install --system -e ".[dev]"
      - run: cd apps/api && ruff check .
      - run: cd apps/api && mypy researchos
      - run: cd apps/api && pytest -q
        env:
          POSTGRES_DSN: postgresql+asyncpg://researchos:researchos@localhost:5432/researchos_test
          REDIS_URL: redis://localhost:6379/15
          SECRET_KEY: ci-secret-key
          DB_USE_NULLPOOL: "true"
          WORKSPACE_ROOT: /tmp/ros-ws-ci
      - run: cd apps/worker && ruff check .
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '9.15.0' }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install
      - run: pnpm -r typecheck
      - run: pnpm --filter web build
